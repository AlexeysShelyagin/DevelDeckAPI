{% extends "!sidebar.html" %}

{% block sidebar1 %}
<div class="wy-side-scroll">
    <div class="wy-side-nav-search">
        <a href="{{ pathto(master_doc) }}" class="icon icon-home">
            gamepadAPI
            <img src="{{ pathto('_static/images/DevelDeck.png', 1) }}" 
                 alt="DevelDeck Logo"
                 style="max-height:40px; width:auto; display:inline-block; margin-left:5px;">

        <div role="search">
            <form id="rtd-search-form" class="wy-form" action="{{ pathto('search.html') }}" method="get">

                <input type="hidden" name="area" value="default">
            </form>
        </div>

    {{ super() }}
</div>
